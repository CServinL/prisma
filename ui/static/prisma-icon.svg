<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Prism body (subtle fill) -->
  <polygon points="256,88 98,392 414,392"
           fill="rgba(255,255,255,0.05)"
           filter="url(#glow)"/>

  <!-- Prism outline -->
  <polygon points="256,88 98,392 414,392"
           fill="none"
           stroke="rgba(255,255,255,0.88)"
           stroke-width="13"
           stroke-linejoin="round"/>

  <!-- Incoming white beam (hits left face at ~175,250) -->
  <line x1="34" y1="250" x2="175" y2="250"
        stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

  <!-- Refracted spectrum exiting right face at ~337,250 -->
  <line x1="337" y1="250" x2="468" y2="163" stroke="#ff6b6b" stroke-width="8" stroke-linecap="round"/>
  <line x1="337" y1="250" x2="472" y2="195" stroke="#ff9f43" stroke-width="8" stroke-linecap="round"/>
  <line x1="337" y1="250" x2="475" y2="228" stroke="#ffd43b" stroke-width="8" stroke-linecap="round"/>
  <line x1="337" y1="250" x2="475" y2="262" stroke="#69db7c" stroke-width="8" stroke-linecap="round"/>
  <line x1="337" y1="250" x2="471" y2="295" stroke="#74c0fc" stroke-width="8" stroke-linecap="round"/>
  <line x1="337" y1="250" x2="463" y2="326" stroke="#b197fc" stroke-width="8" stroke-linecap="round"/>
</svg>
